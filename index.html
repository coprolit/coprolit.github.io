<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coach Dreyer Training Plans</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Coach Dreyer Training Plans</h1>
    <p>Click on a training plan below to view the details.</p>
    <ul id="plan-list">
      <li>Loading...</li>
    </ul>

    <script type="module">
      import { fetchSheetRows } from "./sheetsLoader.js";

      const SHEET_ID = "1JsawymKJADyuKcigW80DVj__yFAwQFpWKCALTXBo0gE";
      const API_KEY = "AIzaSyCw0zGv14vKpt2GjPrXzR7u6hUqZV6JV_4";
      const RANGE = "plans!A1:Z100";
      const FIELDS = "sheets.data.rowData.values(formattedValue)";

      const rows = await fetchSheetRows({
        sheetId: SHEET_ID,
        apiKey: API_KEY,
        range: RANGE,
        fields: FIELDS,
      });

      const list = document.getElementById("plan-list");
      list.innerHTML = "";

      for (const row of rows) {
        const cells = row.values ?? [];
        const name = cells[0]?.formattedValue ?? "";
        if (!name) continue;

        // Remaining cells are the drill IDs for this plan
        const ids = cells
          .slice(1)
          .map((c) => c?.formattedValue ?? "")
          .filter(Boolean);
        if (ids.length === 0) continue;

        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = `training-plan.html?ids=${ids.join("+")}`;
        a.textContent = name;
        li.appendChild(a);
        list.appendChild(li);
      }

      if (list.children.length === 0) {
        list.innerHTML = "<li>No training plans found.</li>";
      }
    </script>
  </body>
</html>
