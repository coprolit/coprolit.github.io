<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .intro {
      max-width: 640px;
      margin: 0 auto 3rem;
      text-align: center;
      font-size: 1.05rem;
      line-height: 1.75;
      color: #4a5568;
    }

    .data-section {
      width: 100%;
      max-width: 760px;
    }

    .data-section h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #553c9a;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 0.5rem;
    }

    .item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .item {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s;
    }

    .item:hover {
      box-shadow: 0 4px 14px rgba(102, 126, 234, 0.2);
    }

    .item-label {
      font-weight: 600;
      font-size: 1rem;
      color: #2d3748;
      margin-bottom: 0.4rem;
    }

    .sub-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .sub-item {
      background: #ebf4ff;
      color: #2b6cb0;
      border-radius: 9999px;
      padding: 0.2rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .status {
      text-align: center;
      color: #718096;
      font-style: italic;
      padding: 2rem 0;
    }

    .status.error {
      color: #c53030;
      font-style: normal;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <header>
    <h1>Hi</h1>
  </header>

  <p class="intro">
    Lorem ipsum dolor sit amet, consectetur adipiscing elit. Quisque vehicula
    feugiat nulla, a tincidunt arcu fringilla et. Pellentesque habitant morbi
    tristique senectus et netus et malesuada fames ac turpis egestas. Vivamus
    lacinia odio vitae vestibulum vestibulum.
  </p>

  <section class="data-section">
    <h2>Training Plans</h2>
    <ul class="item-list" id="item-list">
      <li class="status" id="status-msg">Loading&hellip;</li>
    </ul>
  </section>

  <script>
    (async function () {
      const SHEET_URL =
        'https://docs.google.com/spreadsheets/d/1JsawymKJADyuKcigW80DVj__yFAwQFpWKCALTXBo0gE/gviz/tq?tqx=out:json';

      const statusEl = document.getElementById('status-msg');
      const listEl   = document.getElementById('item-list');

      try {
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const text = await res.text();
        // Google wraps the JSON in a callback: google.visualization.Query.setResponse({...});
        const start = text.indexOf('(');
        const end   = text.lastIndexOf(')');
        if (start === -1 || end === -1 || end <= start) throw new Error('Unexpected response format');
        const data = JSON.parse(text.slice(start + 1, end));

        const rows = data?.table?.rows ?? [];
        if (rows.length === 0) {
          statusEl.textContent = 'No data found.';
          return;
        }

        statusEl.remove();

        rows.forEach((row, rowIndex) => {
          const cells = row.c ?? [];
          const li = document.createElement('li');
          li.className = 'item';

          // First non-null cell is used as the row label; the rest are sub-items
          const values = cells.map(c => (c !== null && c !== undefined && c.v !== null && c.v !== undefined ? String(c.v) : ''));
          const [label, ...subs] = values;

          const labelEl = document.createElement('div');
          labelEl.className = 'item-label';
          labelEl.textContent = label || `Row ${rowIndex + 1}`;
          li.appendChild(labelEl);

          const filledSubs = subs.filter(s => s !== '');
          if (filledSubs.length > 0) {
            const subUl = document.createElement('ul');
            subUl.className = 'sub-list';
            filledSubs.forEach(sub => {
              const subLi = document.createElement('li');
              subLi.className = 'sub-item';
              subLi.textContent = sub;
              subUl.appendChild(subLi);
            });
            li.appendChild(subUl);
          }

          listEl.appendChild(li);
        });
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = `Failed to load data: ${err.message}`;
      }
    })();
  </script>
</body>
</html>
